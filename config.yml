baseURL: "https://masonblog.github.io/"
title: Mason's Blog
pagination:
  pagerSize: 5
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false
enableEmoji: true
googleAnalytics: G-5GJ7PD33N1
enableRobotsTXT: true
ignoreLogs: ['warning-goldmark-raw-html']

markup:
  goldmark:
    renderer:
      unsafe: true

languages:
  zh:
    languageName: "中文"
    languageCode: "zh-CN"
    weight: 1
    title: Mason's Blog
    menu:
      main:
        - name: 文章
          url: archives
          weight: 10
        - name: 作品集
          url: portfolio/
          weight: 20
        - name: 播客
          url: podcast/
          weight: 30
        - name: 搜索
          url: search/
          weight: 40
        - name: 关于
          url: about/
          weight: 50
    params:
      description: "知识分享与微小叙事"
      homeInfoParams:
        titleImage: /images/mason.png
        Title: 知识分享与微小叙事
        Content: 本博客用来记录一些零碎的新知识，也存放偶有的牢骚、絮叨和个人经历。
  en:
    languageName: "English"
    languageCode: "en-US"
    weight: 2
    title: Mason's Blog
    menu:
      main:
        - name: Posts
          url: archives
          weight: 10
        - name: Portfolio
          url: portfolio/
          weight: 20
        - name: Podcast
          url: podcast/
          weight: 30
        - name: Search
          url: search/
          weight: 40
        - name: About
          url: about/
          weight: 50
    params:
      description: "Notes, small stories, and things learned along the way"
      homeInfoParams:
        titleImage: /images/mason.png
        Title: To keep notes on things I learn, along with occasional complaints, digressions, and fragments of personal experience.
        Content: This blog is where I keep notes on things I learn, along with occasional essays, reflections, and personal stories. Unless otherwise stated, all posts are original and may not be reproduced.

sitemap:
  changefreq: ""
  filename: sitemap.xml
  priority: -1

params:
  images:
    - "/images/mason.png"
  dateFormat: 2006-01-02
  author: Mason
  defaultTheme: auto # to switch between dark or light according to browser theme
  displayFullLangName: true

  socialIcons: # optional
    - name: "Github"
      url: "https://github.com/masonblog"
    - name: "Email"
      url: "mailto:me@masonhu.cc"
    - name: "Bilibili"
      url: "https://space.bilibili.com/492153853"
    - name: "ApplePodcasts"
      title: "小宇宙播客"
      url: "https://www.xiaoyuzhoufm.com/podcast/68453dda5d66f3ec9a7aa1b4"

  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRss: true
  mainSections:
    - post
  ShowAllPagesInArchive: false
  ShowPageNums: true
  
  assets:
    # images: "/images/mason.png"
    favicon: "/favicon/favicon.ico"
    favicon16x16: "/favicon/favicon-16x16.png"
    favicon32x32: "/favicon/favicon-32x32.png"
    apple_touch_icon: "/favicon/apple-touch-icon.png"
    safari_pinned_tab: "/favicon/safari-pinned-tab.svg"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
