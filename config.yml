baseURL: "https://blog.masonhu.cc/"
title: Mason's Blog
pagination:
  pagerSize: 5
module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false
enableEmoji: true
googleAnalytics: G-5GJ7PD33N1
enableRobotsTXT: true
ignoreLogs: ['warning-goldmark-raw-html']

markup:
  goldmark:
    renderer:
      unsafe: true

languages:
  zh:
    label: "中文"
    locale: "zh-CN"
    weight: 1
    title: Mason 博客
    menu:
      main:
        - name: 文章
          url: archives
          weight: 10
        - name: 播客
          url: podcast/
          weight: 20
        - name: 作品集
          url: portfolio/
          weight: 30
        - name: 搜索
          url: search/
          weight: 40
        - name: 关于
          url: about/
          weight: 50
    params:
      description: "分享知识与个人叙事"
      homeInfoParams:
        titleImage: /images/mason.png
        Title: 分享知识与个人叙事
        Content: 本博客用来记录一些零碎的经历和想法，也存放个人作品集和播客文稿。
  en:
    label: "English"
    locale: "en-US"
    weight: 2
    title: Mason's Blog
    menu:
      main:
        - name: Posts
          url: archives
          weight: 10
        - name: Podcast
          url: podcast/
          weight: 20
        - name: Portfolio
          url: portfolio/
          weight: 30
        - name: Search
          url: search/
          weight: 40
        - name: About
          url: about/
          weight: 50
    params:
      description: "Knoledge & personal stories."
      homeInfoParams:
        titleImage: /images/mason.png
        Title: Knoledge & personal stories.
        Content: This blog is used to record some fragmented experiences and thoughts, as well as to store my personal portfolio and podcast transcripts.

sitemap:
  changefreq: ""
  filename: sitemap.xml
  priority: -1

params:
  images:
    - "/images/mason.png"
  dateFormat: 2006-01-02
  author: Mason

  podcast:
    title: "议正言辞"
    description: "一档聚焦东西方法律史的播客。节目试图把古罗马与二十一世纪的中国放在同一条线索里，去谈那条通往正义的漫长道路：法律如何在国家与个人、礼俗与规则之间被反复争夺、修补和重写。"
    author: "Mason Hu"
    ownerEmail: "masonhu2026@gmail.com"
    language: "zh-cn"
    category: "Society & Culture"
    explicit: false
    type: "episodic"
    image: "https://blog.masonhu.cc/images/podcast/Cover_talking_directly.png"
    audioURLPattern: "https://podcast.masonhu.cc/talking-directly-%02d.m4a"

  defaultTheme: auto # to switch between dark or light according to browser theme
  displayFullLangName: true

  socialIcons: # optional
    - name: "Github"
      url: "https://github.com/masonblog"
    - name: "Email"
      url: "mailto:me@masonhu.cc"
    - name: "Bilibili"
      url: "https://space.bilibili.com/492153853"
    - name: "ApplePodcasts"
      title: "苹果播客"
      url: "https://podcasts.apple.com/cn/podcast/%E8%AE%AE%E6%AD%A3%E8%A8%80%E8%BE%9E/id6787849374"
    - name: "RSS"
      url: "index.xml"

  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRss: true
  mainSections:
    - post
  ShowAllPagesInArchive: true
  ShowPageNums: true
  
  assets:
    # images: "/images/mason.png"
    favicon: "/favicon/favicon.ico"
    favicon16x16: "/favicon/favicon-16x16.png"
    favicon32x32: "/favicon/favicon-32x32.png"
    apple_touch_icon: "/favicon/apple-touch-icon.png"
    safari_pinned_tab: "/favicon/safari-pinned-tab.svg"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
