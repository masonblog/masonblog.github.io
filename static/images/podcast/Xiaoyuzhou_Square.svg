<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">小宇宙图标</title>
  <desc id="desc">小宇宙官方应用图标样式的正方形图标：浅色圆角背景、蓝绿色星球和黑色环带。</desc>
  <defs>
    <linearGradient id="planet" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#20b4e8"/>
      <stop offset="1" stop-color="#a5d7c9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#f0d7d7" flood-opacity="0.45"/>
    </filter>
    <clipPath id="planetClip">
      <circle cx="256" cy="256" r="117"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="96" fill="#fffafa"/>
  <rect x="16" y="16" width="480" height="480" rx="88" fill="#fff7f7" filter="url(#softShadow)"/>
  <g transform="rotate(-25 256 256)">
    <ellipse cx="256" cy="256" rx="221" ry="43" fill="none" stroke="#050505" stroke-width="26"/>
  </g>
  <circle cx="256" cy="256" r="117" fill="url(#planet)"/>
  <g clip-path="url(#planetClip)">
    <path d="M82 339C170 288 262 238 430 166" fill="none" stroke="#050505" stroke-width="26" transform="rotate(-25 256 256)"/>
  </g>
</svg>
