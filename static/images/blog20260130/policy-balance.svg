<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Quantitative tightening and rate cuts policy balance</title>
  <desc id="desc">A scale showing the tension between quantitative tightening and interest rate cuts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ee"/>
      <stop offset="1" stop-color="#e8f0ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1b2a32" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="122" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="52" font-weight="700" fill="#22313a">“缩表 + 降息”的政策实验</text>
  <text x="122" y="176" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" fill="#51656d">一个试图同时安抚债券市场与白宫的高难度平衡术。</text>
  <g transform="translate(240 250)" filter="url(#shadow)">
    <rect x="500" y="160" width="120" height="360" rx="8" fill="#315463"/>
    <rect x="442" y="500" width="236" height="46" rx="8" fill="#22313a"/>
    <circle cx="560" cy="160" r="36" fill="#b4563d"/>
    <line x1="180" y1="188" x2="940" y2="132" stroke="#22313a" stroke-width="12" stroke-linecap="round"/>
    <line x1="280" y1="180" x2="198" y2="388" stroke="#51656d" stroke-width="5"/>
    <line x1="420" y1="170" x2="338" y2="388" stroke="#51656d" stroke-width="5"/>
    <line x1="730" y1="148" x2="836" y2="350" stroke="#51656d" stroke-width="5"/>
    <line x1="870" y1="138" x2="976" y2="350" stroke="#51656d" stroke-width="5"/>
    <rect x="132" y="388" width="300" height="104" rx="8" fill="#fffdfa"/>
    <rect x="784" y="350" width="300" height="104" rx="8" fill="#fffdfa"/>
    <text x="282" y="436" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#1e5b6d">量化紧缩 QT</text>
    <text x="282" y="472" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#51656d">回收流动性，缩小资产负债表</text>
    <text x="934" y="398" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#b4563d">降息</text>
    <text x="934" y="434" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="21" fill="#51656d">降低融资成本，刺激增长</text>
  </g>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="186" y="742" width="1228" height="58" rx="8" fill="#fffdfa" opacity="0.9"/>
    <text x="800" y="780" text-anchor="middle" font-size="24" fill="#22313a">风险：缩表过快可能抽干市场流动性；降息过快又可能重新点燃通胀。</text>
  </g>
</svg>
