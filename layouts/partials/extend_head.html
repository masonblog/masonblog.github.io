<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3746438298147903"
     crossorigin="anonymous"></script>
{{- $titleImage := .Params.titleImage -}}
{{- $titleIcon := .Params.titleIcon -}}
{{- if and .IsHome (not $titleImage) -}}
  {{- $titleImage = site.Params.homeInfoParams.titleImage -}}
{{- end -}}
{{- if or $titleImage $titleIcon }}
<style>
  .post-title,
  .home-info .entry-header h1 {
    display: flex;
    /* override .entry-hint-parent's space-between, which pushes the text to the right edge */
    justify-content: flex-start;
    align-items: center;
    gap: 0.4em;
  }
  .post-title::before,
  .home-info .entry-header h1::before {
    content: "";
    flex: 0 0 auto;
    height: 1em;
    width: 1em;
    {{- if eq $titleIcon "github" }}
    background-color: currentColor;
    -webkit-mask: url("/images/github.svg") center / contain no-repeat;
    mask: url("/images/github.svg") center / contain no-repeat;
    {{- else }}
    background: url("{{ $titleImage }}") center / contain no-repeat;
    {{- end }}
  }
</style>
{{- end }}
